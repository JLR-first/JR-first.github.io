<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating Color Palettes</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="color-palette">
            <h2>Soft Breeze</h2>
            <h4 id="p1-c1" class="color">#fbeaff</h4>
            <h4 id="p2-c2" class="color">#c2b2c6</h4>
            <h4 id="p3-c3" class="color">#ffe8ff</h4>
            <h4 id="p4-c4" class="color">#005b53</h4>
        </div>
        <div class="color-palette">
            <h2>Collective</h2>
            <h4 id="p5-c5" class="color">#fbeaff</h4>
            <h4 id="p6-c6" class="color">#f8c4e2</h4>
            <h4 id="p7-c7" class="color">#eeb69e</h4>
        </div>
        <div class="color-palette">
            <h2>Sunset</h2>
            <h4 id="p8-c8" class="color">#fbeaff</h4>
            <h4 id="p9-c9" class="color">#00b3ff</h4>
            <h4 id="p10-c10" class="color">#4b7aa9</h4>
            <h4 id="p11-c11" class="color">#3d4856</h4>
        </div>
    </body>
</html>
